name: Discord project summary

on:
  workflow_dispatch:
    inputs:
      extra_context:
        description: "Optional note to include in the summary"
        required: false
        type: string
  push:
    branches:
      - main
      - master
    paths:
      - "Assets/**"
      - "document/**"
      - "memo/**"
      - "ProjectSettings/**"
      - ".github/workflows/discord-project-summary.yml"
      - ".github/scripts/post-project-summary.mjs"

permissions:
  contents: read

jobs:
  post-summary:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate and post summary
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || secrets.OPENAI_API || secrets.OPENAI_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL || secrets.DISCORD_WEBHOOK }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.4-mini' }}
          EXTRA_CONTEXT: ${{ github.event.inputs.extra_context }}
        run: node .github/scripts/post-project-summary.mjs
